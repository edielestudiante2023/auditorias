name: Cutover to Production

on:
  push:
    branches: [main]

jobs:
  # ── Job 1: Validacion completa ──
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: mysqli, mbstring, json, curl, intl, gd

      - name: PHP Lint
        run: |
          find app/ -name "*.php" -print0 | xargs -0 -n1 php -l 2>&1 | grep -q "Parse error" && exit 1 || echo "Sin errores de sintaxis"

      - name: Buscar credenciales hardcodeadas
        run: |
          FOUND=0
          if grep -rn "SG\.[a-zA-Z0-9_-]\{20,\}" app/ --include="*.php" 2>/dev/null; then FOUND=1; fi
          if grep -rn "AVNS_[a-zA-Z0-9_-]\{10,\}" app/ --include="*.php" 2>/dev/null; then FOUND=1; fi
          if grep -rn "sk-[a-zA-Z0-9]\{20,\}" app/ --include="*.php" 2>/dev/null; then FOUND=1; fi
          if [ $FOUND -eq 1 ]; then echo "FALLO: Credenciales encontradas"; exit 1; fi
          echo "OK: Sin credenciales hardcodeadas"

  # ── Job 2: Trivy (paralelo con semgrep) ──
  trivy:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - name: Trivy - Escaneo de vulnerabilidades
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'HIGH,CRITICAL'
          exit-code: '1'

  # ── Job 3: Semgrep (paralelo con trivy) ──
  semgrep:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - name: Semgrep - Analisis estatico
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/php
            p/secrets
            p/security-audit

  # ── Job 4: Deploy a produccion ──
  deploy-production:
    runs-on: ubuntu-latest
    needs: [trivy, semgrep]
    steps:
      - name: Deploy a produccion via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd ${{ secrets.PROD_PATH }}
            git pull origin main
            composer install --no-dev --optimize-autoloader
            php spark migrate
            echo "Deploy a PRODUCCION completado: $(date)"

      - name: Verificacion post-deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://auditorias.cycloidtalent.com/)
            if [ "$HTTP_CODE" -ne 200 ]; then
              echo "FALLO: La aplicacion responde $HTTP_CODE (esperado 200)"
              exit 1
            fi
            echo "OK: Aplicacion respondiendo correctamente (HTTP $HTTP_CODE)"
