name: Validate & Deploy to QA

on:
  push:
    branches: [develop, 'feature/*']
  pull_request:
    branches: [develop]

jobs:
  # ── Job 1: Verificacion de sintaxis PHP ──
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: mysqli, mbstring, json, curl, intl, gd

      - name: PHP Lint - Verificar sintaxis
        run: |
          echo "=== Verificando sintaxis PHP ==="
          find app/ -name "*.php" -print0 | xargs -0 -n1 php -l 2>&1 | grep -v "No syntax errors" || true
          find app/ -name "*.php" -print0 | xargs -0 -n1 php -l 2>&1 | grep -q "Parse error" && exit 1 || echo "Sin errores de sintaxis"

  # ── Job 2: Escaneo de vulnerabilidades en dependencias ──
  trivy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Trivy - Escaneo de vulnerabilidades
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'HIGH,CRITICAL'
          exit-code: '1'

  # ── Job 3: Analisis estatico de seguridad ──
  semgrep:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Semgrep - Analisis estatico
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/php
            p/secrets
            p/security-audit

  # ── Job 4: Busqueda de credenciales hardcodeadas ──
  secrets-scan:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Buscar API Keys hardcodeadas
        run: |
          echo "=== Buscando credenciales hardcodeadas ==="
          FOUND=0

          # SendGrid
          if grep -rn "SG\.[a-zA-Z0-9_-]\{20,\}" app/ --include="*.php" 2>/dev/null; then
            echo "CRITICO: SendGrid API key hardcodeada encontrada"
            FOUND=1
          fi

          # Passwords de BD
          if grep -rn "AVNS_[a-zA-Z0-9_-]\{10,\}" app/ --include="*.php" 2>/dev/null; then
            echo "CRITICO: Password de DigitalOcean DB encontrada"
            FOUND=1
          fi

          # OpenAI
          if grep -rn "sk-[a-zA-Z0-9]\{20,\}" app/ --include="*.php" 2>/dev/null; then
            echo "CRITICO: OpenAI API key hardcodeada encontrada"
            FOUND=1
          fi

          # Conexiones directas a BD
          if grep -rn "new mysqli.*root.*cycloid" app/ --include="*.php" 2>/dev/null; then
            echo "ADVERTENCIA: Conexion directa a BD encontrada en codigo"
            FOUND=1
          fi

          if [ $FOUND -eq 1 ]; then
            echo "FALLO: Se encontraron credenciales hardcodeadas"
            exit 1
          fi

          echo "OK: No se encontraron credenciales hardcodeadas"

  # ── Job 5: Deploy a QA (solo en push a develop) ──
  deploy-qa:
    runs-on: ubuntu-latest
    needs: [trivy, semgrep, secrets-scan]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    steps:
      - name: Deploy a servidor QA via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.QA_HOST }}
          username: ${{ secrets.QA_USER }}
          key: ${{ secrets.QA_SSH_KEY }}
          script: |
            cd ${{ secrets.QA_PATH }}
            git pull origin develop
            composer install --no-dev --optimize-autoloader
            php spark migrate
            echo "Deploy a QA completado: $(date)"
